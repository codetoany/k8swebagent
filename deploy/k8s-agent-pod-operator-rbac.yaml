apiVersion: v1
kind: Namespace
metadata:
  name: k8s-agent-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-agent-reader
  namespace: k8s-agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agent-pod-operator
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch", "delete"]

  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["patch", "update"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["patch", "update", "delete"]

  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]

  - apiGroups: ["batch"]
    resources:
      - cronjobs
    verbs: ["delete"]

  - apiGroups: ["events.k8s.io"]
    resources:
      - events
    verbs: ["get", "list", "watch"]

  - nonResourceURLs:
      - /version
      - /healthz
      - /livez
      - /readyz
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agent-pod-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-agent-pod-operator
subjects:
  - kind: ServiceAccount
    name: k8s-agent-reader
    namespace: k8s-agent-system
