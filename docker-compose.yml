services:
  postgres:
    image: postgres:16-alpine
    container_name: k8s-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-k8s_agent}
      POSTGRES_USER: ${POSTGRES_USER:-k8s_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-k8s_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-k8s_agent} -d ${POSTGRES_DB:-k8s_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: k8s-agent-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  k8s-agent-api:
    container_name: k8s-agent-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-k8s_agent}
      POSTGRES_USER: ${POSTGRES_USER:-k8s_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-k8s_agent}
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      REDIS_TTL_SECONDS: 60
      K8S_REQUEST_TIMEOUT_SECONDS: 10
      AI_INSPECTION_INTERVAL_SECONDS: ${AI_INSPECTION_INTERVAL_SECONDS:-600}
      AI_INSPECTION_STARTUP_DELAY_SECONDS: ${AI_INSPECTION_STARTUP_DELAY_SECONDS:-15}
      CLUSTER_CONSOLE_ENABLED: ${CLUSTER_CONSOLE_ENABLED:-false}
      CLUSTER_CONSOLE_SESSION_TIMEOUT_SECONDS: ${CLUSTER_CONSOLE_SESSION_TIMEOUT_SECONDS:-1800}
      CLUSTER_CONSOLE_SHELL_PATH: ${CLUSTER_CONSOLE_SHELL_PATH:-/bin/sh}
      CLUSTER_CONSOLE_KUBECTL_PATH: ${CLUSTER_CONSOLE_KUBECTL_PATH:-kubectl}
      HOST_SHELL_ENABLED: ${HOST_SHELL_ENABLED:-false}
      HOST_SHELL_SESSION_TIMEOUT_SECONDS: ${HOST_SHELL_SESSION_TIMEOUT_SECONDS:-1800}
      HOST_SHELL_NAMESPACE: ${HOST_SHELL_NAMESPACE:-k8s-agent-system}
      HOST_SHELL_DAEMONSET_NAME: ${HOST_SHELL_DAEMONSET_NAME:-k8s-agent-host-shell}
      HOST_SHELL_POD_LABEL_SELECTOR: ${HOST_SHELL_POD_LABEL_SELECTOR:-app.kubernetes.io/name=k8s-agent-host-shell}
      HOST_SHELL_CONTAINER_NAME: ${HOST_SHELL_CONTAINER_NAME:-host-shell}
      HOST_SHELL_SHELL_PATH: ${HOST_SHELL_SHELL_PATH:-/bin/sh}
      HOST_SHELL_ENTER_COMMAND: ${HOST_SHELL_ENTER_COMMAND:-nsenter -t 1 -m -u -i -n -p -- chroot /proc/1/root /bin/sh -l}
      OBSERVABILITY_TIMEOUT_SECONDS: ${OBSERVABILITY_TIMEOUT_SECONDS:-15}
      OBSERVABILITY_PROMETHEUS_URL: ${OBSERVABILITY_PROMETHEUS_URL:-}
      OBSERVABILITY_PROMETHEUS_TOKEN: ${OBSERVABILITY_PROMETHEUS_TOKEN:-}
      OBSERVABILITY_PROMETHEUS_CPU_QUERY: ${OBSERVABILITY_PROMETHEUS_CPU_QUERY:-}
      OBSERVABILITY_PROMETHEUS_MEMORY_QUERY: ${OBSERVABILITY_PROMETHEUS_MEMORY_QUERY:-}
      OBSERVABILITY_LOKI_URL: ${OBSERVABILITY_LOKI_URL:-}
      OBSERVABILITY_LOKI_TOKEN: ${OBSERVABILITY_LOKI_TOKEN:-}
      OBSERVABILITY_LOKI_QUERY_TEMPLATE: ${OBSERVABILITY_LOKI_QUERY_TEMPLATE:-}
      K8S_BOOTSTRAP_MODE: ${K8S_BOOTSTRAP_MODE:-}
      K8S_BOOTSTRAP_NAME: ${K8S_BOOTSTRAP_NAME:-Default Cluster}
      K8S_BOOTSTRAP_KUBECONFIG: ${K8S_BOOTSTRAP_KUBECONFIG:-}
      K8S_BOOTSTRAP_KUBECONFIG_PATH: ${K8S_BOOTSTRAP_KUBECONFIG_PATH:-}
      K8S_BOOTSTRAP_API_SERVER: ${K8S_BOOTSTRAP_API_SERVER:-}
      K8S_BOOTSTRAP_TOKEN: ${K8S_BOOTSTRAP_TOKEN:-}
      K8S_BOOTSTRAP_CA_DATA: ${K8S_BOOTSTRAP_CA_DATA:-}
      K8S_BOOTSTRAP_INSECURE_SKIP_TLS_VERIFY: ${K8S_BOOTSTRAP_INSECURE_SKIP_TLS_VERIFY:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  k8s-agent-frontend:
    container_name: k8s-agent-frontend
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      k8s-agent-api:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
